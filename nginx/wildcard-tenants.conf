# Buzeye CRM - Wildcard Subdomain for Tenants
# Each tenant: {slug}.buzeye.com
# Add to /etc/nginx/sites-available/ and symlink to sites-enabled
# 
# DNS: *.buzeye.com → your server IP
# SSL: certbot --nginx -d "*.buzeye.com" -d buzeye.com

# Main domain (your admin/landing)
server {
    listen 80;
    server_name buzeye.com www.buzeye.com;
    # ... your main site config
    return 301 https://$host$request_uri;
}

# Wildcard for tenant subdomains - HTTP
server {
    listen 80;
    server_name *.buzeye.com;
    
    # Default - will be overridden by specific tenant configs
    # Or use a map/lua to route by subdomain
    
    set $tenant_port_frontend 5173;
    set $tenant_port_backend 5000;
    
    location / {
        proxy_pass http://127.0.0.1:$tenant_port_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location /api {
        proxy_pass http://127.0.0.1:$tenant_port_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# NOTE: Nginx variables in proxy_pass need a workaround.
# Option 1: Separate server{} block per tenant (auto-generated by provision-tenant.sh)
# Option 2: Use nginx stream or map to resolve subdomain → port
# 
# Recommended: provision-tenant.sh generates per-tenant configs.
# Include them: include /etc/nginx/conf.d/buzeye-tenants/*.conf;
