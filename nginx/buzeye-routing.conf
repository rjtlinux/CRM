# Buzeye domain routing
# buzeye.com, www.buzeye.com → Marketing site
# admin.buzeye.com → Admin CRM (frontend + backend)
# {slug}.buzeye.com → Tenant CRM (per-tenant configs from provision-tenant.sh)

# Marketing - buzeye.com
server {
    listen 80;
    server_name buzeye.com www.buzeye.com;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin CRM - admin.buzeye.com
server {
    listen 80;
    server_name admin.buzeye.com;
    
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Tenants: include per-tenant configs generated by provision-tenant.sh
# include /etc/nginx/conf.d/buzeye-tenants/*.conf;
